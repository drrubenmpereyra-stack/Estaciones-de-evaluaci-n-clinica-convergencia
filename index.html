<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación Clínica</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #050508; color: #d4af37; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .contenido { max-width: 800px; width: 100%; padding: 40px; border: 1px solid #d4af37; border-radius: 15px; background: #0d1117; }
        .btn { padding: 10px 20px; border: 1px solid #d4af37; color: #d4af37; background: transparent; cursor: pointer; margin: 5px; }
        .btn:hover { background: #d4af37; color: #000; }
        video, audio { width: 100%; margin: 20px 0; border: 1px solid #d4af37; }
        #feedback { margin: 15px 0; font-style: italic; color: #aaa; min-height: 50px; }
    </style>
</head>
<body>

<div class="contenido">
    <h1 id="titulo-estacion">Cargando Estación...</h1>
    <div id="media-container"></div>

    <div id="contenedor-evaluacion">
        <h3 id="pregunta-texto">Cargando...</h3>
        <div id="opciones-container"></div>
        <div id="feedback"></div>
        <button id="btn-siguiente" class="btn" style="display:none;">Siguiente Pregunta</button>
        <button id="btn-cerrar" class="btn" style="display:none; border-color: #d4af37;">Cerrar Estación y Volver al Mapa</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const user = localStorage.getItem("usuarioActual") || "INVITADO";

    // Mapeo básico: aquí debes completar los nombres y recursos para cada ID
    const estacionesInfo = {
        1: { titulo: "Cartografía de la Intersubjetividad", video: "https://github.com/drrubenmpereyra-stack/video-trazado-estacion-1/raw/refs/heads/main/video_traazado.mp4", audio: "https://github.com/drrubenmpereyra-stack/audio-estacion-1/raw/refs/heads/main/Audio1.mp4" }
        // Agregar aquí los IDs 2 al 10 según avancemos
    };

    const info = estacionesInfo[id] || { titulo: "Estación en Desarrollo", video: "", audio: "" };
    document.getElementById('titulo-estacion').textContent = info.titulo;
    document.getElementById('media-container').innerHTML = `
        <video controls src="${info.video}"></video>
        <audio controls src="${info.audio}"></audio>
    `;

    // Lógica de evaluación (Idéntica a la Estación 1)
    const bancoPreguntas = [ /* Tus 10 preguntas aquí */ ];
    let indice = 0;

    function cargarPregunta() {
        if(bancoPreguntas.length === 0) {
            document.getElementById('pregunta-texto').textContent = "Evaluación en desarrollo.";
            document.getElementById('btn-cerrar').style.display = "inline-block";
            return;
        }
        const p = bancoPreguntas[indice];
        document.getElementById('pregunta-texto').textContent = p.q;
        const container = document.getElementById('opciones-container');
        container.innerHTML = p.o.map((op, i) => `<button class="btn" onclick="validar(${i})">${op}</button>`).join('');
    }

    function validar(i) {
        document.getElementById('feedback').textContent = "Feedback: " + bancoPreguntas[indice].f;
        document.getElementById('btn-siguiente').style.display = "inline-block";
    }

    document.getElementById('btn-siguiente').onclick = () => {
        indice++;
        if (indice < bancoPreguntas.length) cargarPregunta();
        else {
            document.getElementById('btn-cerrar').style.display = "inline-block";
            document.getElementById('btn-siguiente').style.display = "none";
        }
    };

    document.getElementById('btn-cerrar').onclick = () => {
        window.location.href = "estacion_integracion_sinaptica.html";
    };

    cargarPregunta();
</script>
</body>
</html>
